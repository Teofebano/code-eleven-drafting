<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Draft Results — Code Eleven</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/shared.css">
<style>
  .main{max-width:1000px;margin:0 auto;padding:24px 20px;}
  .results-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,8vw,5rem);letter-spacing:3px;line-height:.95;}
  .results-title em{color:var(--lime);font-style:normal;}
  .sort-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:20px;background:var(--card);border:1px solid var(--border);border-radius:5px;padding:10px 14px;}
  .sort-label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .sort-btn{font-family:'Inter',sans-serif;font-weight:600;font-size:.78rem;padding:5px 12px;border-radius:3px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;text-transform:uppercase;}
  .sort-btn:hover{border-color:var(--white);color:var(--white);}
  .sort-btn.active{border-color:var(--lime);color:var(--lime);background:rgba(184,255,63,.07);}
  .teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;}
  .team-card{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .team-card-header{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:1.5px;padding:12px 16px;background:var(--pitch-light);border-bottom:2px solid var(--lime);display:flex;justify-content:space-between;align-items:center;color:var(--lime);}
  .team-player-row{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;border-bottom:1px solid rgba(45,92,62,.3);font-size:.87rem;}
  .team-player-row:last-child{border-bottom:none;}
  .pos-badge{font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:700;padding:2px 6px;border-radius:2px;text-transform:uppercase;}
  .pos-gk{background:rgba(255,201,60,.2);color:var(--gold);}
  .pos-def{background:rgba(128,200,255,.15);color:var(--blue);}
  .pos-mid{background:rgba(184,255,63,.13);color:var(--lime);}
  .pos-atk{background:rgba(255,77,77,.15);color:#ff8080;}
  .pos-unknown{background:rgba(255,255,255,.05);color:var(--muted);}
  .year-tag{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);}
  .event-chip{display:inline-block;padding:5px 14px;border-radius:3px;border:1.5px solid var(--border);font-size:.82rem;font-weight:600;cursor:pointer;margin:4px;transition:all .15s;}
  .event-chip:hover,.event-chip.active{border-color:var(--lime);color:var(--lime);background:rgba(184,255,63,.07);}
  /* standings */
  .standings-section{margin-top:32px;}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;margin-bottom:14px;}
</style>
</head>
<body>
<div id="toast"></div>
<header>
  <div class="logo">CODE <span>ELEVEN</span></div>
  <div class="header-right">
    <div class="header-badge">Results</div>
    <button class="btn btn-secondary btn-sm" onclick="logout()">Leave</button>
  </div>
</header>
<div class="main">
  <div style="text-align:center;padding:28px 0 16px">
    <div class="results-title">SQUAD<em>LIST.</em></div>
    <div id="results-sub" style="color:var(--muted);font-size:.88rem;margin-top:8px">Loading…</div>
  </div>
  <div id="event-picker" style="text-align:center;margin-bottom:24px"></div>
  <div id="content"></div>
</div>
<script>
const POS_ORDER={GK:0,DEF:1,MID:2,ATK:3};
const POS_CLASS={GK:'pos-gk',DEF:'pos-def',MID:'pos-mid',ATK:'pos-atk'};
let data=null, standings=null, ws=null, currentSort='year', currentEventId=null, events=[];

async function init() {
  const me=await fetch('/api/auth/me').then(r=>r.json());
  if (!me.role||!['player','captain','admin'].includes(me.role)){window.location.href='/';return;}
  events=await fetch('/api/events').then(r=>r.json());
  if (!events.length){document.getElementById('content').innerHTML='<div class="empty-state">No events yet.</div>';return;}
  renderEventPicker();
  selectEvent(events[0].id);
}

function renderEventPicker(){
  const el=document.getElementById('event-picker');
  if(events.length<=1){el.style.display='none';return;}
  el.innerHTML=events.map(ev=>`<span class="event-chip ${ev.id===currentEventId?'active':''}" onclick="selectEvent('${ev.id}')">${ev.name}</span>`).join('');
}

function selectEvent(eid){
  currentEventId=eid;
  if(ws){try{ws.close();}catch(e){}}
  connectWS();
  loadResults();
  renderEventPicker();
}

async function loadResults(){
  const res=await fetch(`/api/events/${currentEventId}/results`);
  if(!res.ok){window.location.href='/';return;}
  data=await res.json();
  standings=await fetch(`/api/events/${currentEventId}/standings`).then(r=>r.json()).catch(()=>null);
  render();
}

function connectWS(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws/draft?room=event:${currentEventId}`);
  ws.onmessage=e=>{
    const msg=JSON.parse(e.data);
    if(['player_picked','players_updated','phase_change','reset','fixtures_updated'].includes(msg.type)) loadResults();
  };
  ws.onclose=()=>setTimeout(()=>{if(currentEventId)connectWS();},2000);
  setInterval(()=>{if(ws&&ws.readyState===1)ws.send('ping');},20000);
}

function posClass(pos){return POS_CLASS[pos?.toUpperCase()]||'pos-unknown';}

function sortPlayers(pls){
  const s=[...pls];
  if(currentSort==='position'){const o={GK:0,DEF:1,MID:2,ATK:3};s.sort((a,b)=>{const pa=o[a.position?.toUpperCase()]??99,pb=o[b.position?.toUpperCase()]??99;return pa!==pb?pa-pb:a.name.localeCompare(b.name);});}
  else if(currentSort==='name') s.sort((a,b)=>a.name.localeCompare(b.name));
  else s.sort((a,b)=>a.batch_year-b.batch_year);
  return s;
}

function setSort(s){
  currentSort=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('active',b.dataset.sort===s));
  const w=document.getElementById('teams-wrap');
  if(w) w.innerHTML=teamsInnerHTML();
  const uw=document.getElementById('undrafted-wrap');
  if(uw) uw.innerHTML=undraftedInnerHTML();
}

function render(){
  if(!data) return;
  const drafted=data.players.filter(p=>p.taken_by).length;
  const total=data.players.length;
  const phase=data.phase;
  const sub=document.getElementById('results-sub');
  sub.textContent=`${data.event?.name||''} · ${drafted} of ${total} players assigned · ${data.captains.length} teams`;

  let html='<div class="sort-bar">'
    +'<span class="sort-label">Sort:</span>'
    +['year','position','name'].map(s=>`<button class="sort-btn ${currentSort===s?'active':''}" data-sort="${s}" onclick="setSort('${s}')">${s==='year'?'Batch Year':s==='position'?'Position':'Name'}</button>`).join('')
    +'</div>';
  html+=`<div class="teams-grid" id="teams-wrap">${teamsInnerHTML()}</div>`;
  html+=undraftedSection();
  html+=standingsSection();
  document.getElementById('content').innerHTML=html;
}

function teamsInnerHTML(){
  if(!data?.captains?.length) return '<div class="empty-state">No teams yet.</div>';
  return data.captains.map(cap=>{
    const mine=sortPlayers(data.players.filter(p=>p.taken_by===cap.id));
    return `<div class="team-card">
      <div class="team-card-header">${cap.name}<span class="mono" style="font-size:.82rem;color:var(--muted);font-weight:normal">${mine.length}</span></div>
      ${mine.length?mine.map(p=>`<div class="team-player-row">
        <span style="font-weight:600">${p.name}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="pos-badge ${posClass(p.position)}">${p.position||'?'}</span>
          <span class="year-tag">${p.batch_year}</span>
        </div>
      </div>`).join(''):'<div style="padding:12px 16px;font-size:.82rem;color:var(--muted)">No players yet</div>'}
    </div>`;
  }).join('');
}

function undraftedSection(){
  const ud=sortPlayers(data.players.filter(p=>!p.taken_by));
  if(!ud.length) return '';
  return `<div style="margin-top:28px">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;color:var(--muted);padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:14px">Undrafted (${ud.length})</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px" id="undrafted-wrap">${undraftedInnerHTML()}</div>
  </div>`;
}
function undraftedInnerHTML(){
  const ud=sortPlayers(data.players.filter(p=>!p.taken_by));
  return ud.map(p=>`<div style="background:var(--card);border:1px dashed var(--border);border-radius:4px;padding:10px 14px;opacity:.6">
    <div style="font-weight:700">${p.name}</div>
    <div style="display:flex;gap:6px;margin-top:4px">
      <span class="pos-badge ${posClass(p.position)}">${p.position||'?'}</span>
      <span class="year-tag">${p.batch_year}</span>
    </div>
  </div>`).join('');
}

function standingsSection(){
  if(!standings||!standings.table?.length) return '';
  const {table,player_stats}=standings;
  let html=`<div class="standings-section">
    <div class="section-title">Group Table</div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead>
      <tbody>${table.map((t,i)=>`<tr style="${i===0?'background:rgba(184,255,63,.05)':''}">
        <td class="mono" style="color:var(--muted)">${i+1}</td>
        <td><strong>${t.name}</strong></td>
        <td class="mono">${t.p}</td><td class="mono">${t.w}</td><td class="mono">${t.d}</td><td class="mono">${t.l}</td>
        <td class="mono">${t.gf}</td><td class="mono">${t.ga}</td>
        <td class="mono" style="color:${t.gd>0?'var(--lime)':t.gd<0?'var(--danger)':'var(--muted)'}">${t.gd>0?'+':''}${t.gd}</td>
        <td><strong style="color:var(--lime)">${t.pts}</strong></td>
      </tr>`).join('')}
    </tbody></table></div>`;
  if(player_stats?.length){
    html+=`<div class="section-title" style="margin-top:24px">Player Stats</div>
      <table><thead><tr><th>Player</th><th>⚽ Goals</th><th>🎯 Assists</th><th>🧤 Cleansheets</th></tr></thead>
      <tbody>${player_stats.slice(0,15).map(p=>`<tr>
        <td><strong>${p.name}</strong></td>
        <td class="mono" style="color:var(--lime)">${p.goals||0}</td>
        <td class="mono">${p.assists||0}</td>
        <td class="mono">${p.cleansheets||0}</td>
      </tr>`).join('')}</tbody></table>`;
  }
  html+='</div>';
  return html;
}

async function logout(){await fetch('/api/auth/logout',{method:'POST'});window.location.href='/';}
function toast(msg,e=false){const el=document.getElementById('toast');el.textContent=msg;el.className='show'+(e?' error':'');clearTimeout(toast._t);toast._t=setTimeout(()=>el.className='',2800);}
init();
</script>
</body>
</html>
