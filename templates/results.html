<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Results — Code Eleven</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/shared.css">
<style>
  .main{max-width:1000px;margin:0 auto;padding:24px 20px;}
  .results-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,8vw,5rem);letter-spacing:3px;line-height:.95;text-align:center;}
  .results-title em{color:var(--lime);font-style:normal;}
  .sort-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:20px;background:var(--card);border:1px solid var(--border);border-radius:5px;padding:10px 14px;}
  .sort-btn{font-weight:600;font-size:.78rem;padding:5px 12px;border-radius:3px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;text-transform:uppercase;}
  .sort-btn.active{border-color:var(--lime);color:var(--lime);background:rgba(184,255,63,.07);}
  .teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;}
  .team-card{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .team-card-header{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:1.5px;padding:12px 16px;background:var(--pitch-light);border-bottom:2px solid var(--lime);display:flex;justify-content:space-between;align-items:center;color:var(--lime);}
  .team-player-row{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;border-bottom:1px solid rgba(45,92,62,.3);font-size:.87rem;}
  .team-player-row:last-child{border-bottom:none;}
  .pos-badge{font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:700;padding:2px 6px;border-radius:2px;text-transform:uppercase;}
  .pos-gk{background:rgba(255,201,60,.2);color:var(--gold);}.pos-def{background:rgba(128,200,255,.15);color:var(--blue);}
  .pos-mid{background:rgba(184,255,63,.13);color:var(--lime);}.pos-atk{background:rgba(255,77,77,.15);color:#ff8080;}
  .pos-unknown{background:rgba(255,255,255,.05);color:var(--muted);}
  .year-tag{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;margin:28px 0 12px;}
</style>
</head>
<body>
<div id="toast"></div>
<header>
  <div class="logo">CODE <span>ELEVEN</span></div>
  <div class="header-right">
    <div class="header-badge" id="ev-badge">Results</div>
    <button class="btn btn-secondary btn-sm" onclick="logout()">Leave</button>
  </div>
</header>
<div class="main">
  <div style="padding:24px 0 12px">
    <div class="results-title">SQUAD<em>LIST.</em></div>
    <div id="results-sub" style="color:var(--muted);font-size:.88rem;margin-top:8px;text-align:center">Loading…</div>
  </div>
  <div id="content"></div>
</div>
<script>
const POS_CLASS={GK:'pos-gk',DEF:'pos-def',MID:'pos-mid',ATK:'pos-atk'};
let data=null,standings=null,ws=null,currentSort='year';
const eid=location.pathname.split('/results/')[1];

async function init(){
  const me=await fetch('/api/auth/me').then(r=>r.json());
  if(!me.role||!['viewer','captain','admin'].includes(me.role)){window.location.href='/';return;}
  await loadResultsData();
  connectWS();
}

async function loadResultsData(){
  const res=await fetch(`/api/events/${eid}/results`);
  if(!res.ok){window.location.href='/';return;}
  data=await res.json();
  standings=await fetch(`/api/events/${eid}/standings-full`).then(r=>r.json()).catch(()=>null);
  document.getElementById('ev-badge').textContent=data.event?.name||'Results';
  render();
}

function connectWS(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws/draft?room=event:${eid}`);
  ws.onmessage=e=>{
    const msg=JSON.parse(e.data);
    if(['player_picked','players_updated','phase_change','reset','fixtures_updated','shuttle_updated'].includes(msg.type)) loadResultsData();
  };
  ws.onclose=()=>setTimeout(connectWS,2000);
  setInterval(()=>{if(ws&&ws.readyState===1)ws.send('ping');},20000);
}

function posClass(pos){return POS_CLASS[pos?.toUpperCase()]||'pos-unknown';}

function sortPlayers(pls){
  const s=[...pls];
  const o={GK:0,DEF:1,MID:2,ATK:3};
  if(currentSort==='position') s.sort((a,b)=>{const pa=o[a.position?.toUpperCase()]??99,pb=o[b.position?.toUpperCase()]??99;return pa!==pb?pa-pb:a.name.localeCompare(b.name);});
  else if(currentSort==='name') s.sort((a,b)=>a.name.localeCompare(b.name));
  else s.sort((a,b)=>a.batch_year-b.batch_year);
  return s;
}

function setSort(s){
  currentSort=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('active',b.dataset.sort===s));
  const w=document.getElementById('teams-wrap');if(w)w.innerHTML=teamsInnerHTML();
  const uw=document.getElementById('undrafted-wrap');if(uw)uw.innerHTML=undraftedInnerHTML();
}

function render(){
  if(!data)return;
  const drafted=data.players.filter(p=>p.taken_by).length,total=data.players.length;
  document.getElementById('results-sub').textContent=`${data.event?.name||''} · ${drafted} of ${total} players · ${data.captains.length} teams`;
  // build captain lookup maps (keyed by team display name and by id)
  window._capByName={}; window._capById={};
  (data.captains||[]).forEach(function(c){ var k=c.team_name||c.name; window._capByName[k]=c; window._capById[c.id]=c; });
  // order: table → fixtures → player stats → squad list
  let html='';
  if(standings?.table?.length) html+=standingsHTML();
  if(standings?.gameweeks?.length) html+=fixturesHTML();

  const sortBar=`<div class="sort-bar"><span style="font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Sort:</span>`
    +['year','position','name'].map(s=>`<button class="sort-btn ${currentSort===s?'active':''}" data-sort="${s}" onclick="setSort('${s}')">${s==='year'?'Batch Year':s==='position'?'Position':'Name'}</button>`).join('')
    +'</div>';
  // Squad list - collapsible
  html+='<details style="margin-bottom:8px"><summary style="background:var(--card);border:1px solid var(--border);border-radius:5px;padding:12px 16px;font-family:Bebas Neue,sans-serif;font-size:1.2rem;letter-spacing:1.5px;cursor:pointer;list-style:none;display:flex;align-items:center">Squad List <span style="margin-left:auto;font-size:.8rem;font-family:Inter,sans-serif;font-weight:600;color:var(--lime)">▼ Show</span></summary>';
  html+='<div style="margin-top:4px">'+sortBar+'<div class="teams-grid" id="teams-wrap">'+teamsInnerHTML()+'</div></div>';
  html+='</details>';
  const ud=data.players.filter(p=>!p.taken_by);
  if(ud.length){
    html+='<details><summary style="background:var(--card);border:1px solid var(--border);border-radius:5px;padding:10px 16px;font-size:.82rem;font-weight:700;color:var(--muted);cursor:pointer;list-style:none;display:flex;align-items:center">Undrafted ('+ud.length+') <span style="margin-left:auto;font-size:.7rem">▼</span></summary>';
    html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-top:4px" id="undrafted-wrap">'+undraftedInnerHTML()+'</div>';
    html+='</details>';
  }
  document.getElementById('content').innerHTML=html;
}

function teamsInnerHTML(){
  if(!data?.captains?.length) return '<div class="empty-state">No teams yet.</div>';
  return data.captains.map(cap=>{
    const mine=sortPlayers(data.players.filter(p=>p.taken_by===cap.id));
    const displayName=cap.team_name||cap.name;
    const logoEl=cap.team_logo?`<img src="${cap.team_logo}" onclick="zoomLogo('${cap.team_logo}')" style="width:32px;height:32px;border-radius:4px;object-fit:cover;cursor:pointer;flex-shrink:0"/>`:'';
    return `<div class="team-card"><div class="team-card-header"><span style="display:inline-flex;align-items:center;gap:8px">${logoEl}${displayName}</span><span class="mono" style="font-size:.82rem;color:var(--muted);font-weight:normal">${mine.length}</span></div>
      ${mine.length?mine.map(p=>`<div class="team-player-row"><span style="display:inline-flex;align-items:center;gap:5px;font-weight:600"><span>${p.name}</span>${p.name===cap.name?'<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--gold);color:var(--pitch);font-size:.6rem;font-weight:900;flex-shrink:0" title="Captain">C</span>':''}</span>
        <div style="display:flex;align-items:center;gap:6px"><span class="pos-badge ${posClass(p.position)}">${p.position||'?'}</span><span class="year-tag">${p.batch_year}</span></div>
      </div>`).join(''):'<div style="padding:12px 16px;font-size:.82rem;color:var(--muted)">No players yet</div>'}
    </div>`;
  }).join('');
}

function undraftedInnerHTML(){
  return sortPlayers(data.players.filter(p=>!p.taken_by)).map(p=>
    `<div style="background:var(--card);border:1px dashed var(--border);border-radius:4px;padding:10px 14px;opacity:.6">
      <div style="font-weight:700">${p.name}</div>
      <div style="display:flex;gap:6px;margin-top:4px"><span class="pos-badge ${posClass(p.position)}">${p.position||'?'}</span><span class="year-tag">${p.batch_year}</span></div>
    </div>`).join('');
}

function logoImg(url,size){
  if(!url) return '';
  return `<img src="${url}" onclick="zoomLogo(this.src)" style="width:${size}px;height:${size}px;border-radius:3px;object-fit:cover;cursor:pointer;flex-shrink:0"/>`;
}
function teamCell(name,size){
  size=size||20;
  var cap=window._capByName&&window._capByName[name];
  var logo=cap?logoImg(cap.team_logo,size):'';
  return `<span style="display:inline-flex;align-items:center;gap:6px">${logo}<strong>${name}</strong></span>`;
}

function standingsHTML(){
  var table=standings.table, player_stats=standings.player_stats;
  var h='<div class="section-title">Group Table</div><div style="overflow-x:auto"><table>'
    +'<thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>';
  table.forEach(function(t,i){
    h+='<tr style="'+(i===0?'background:rgba(184,255,63,.05)':'')+'">'
      +'<td class="mono" style="color:var(--muted)">'+(i+1)+'</td>'
      +'<td>'+teamCell(t.name)+'</td>'
      +'<td class="mono">'+t.p+'</td><td class="mono">'+t.w+'</td><td class="mono">'+t.d+'</td><td class="mono">'+t.l+'</td>'
      +'<td class="mono">'+t.gf+'</td><td class="mono">'+t.ga+'</td>'
      +'<td class="mono" style="color:'+(t.gd>0?'var(--lime)':t.gd<0?'var(--danger)':'var(--muted)')+'">'+( t.gd>0?'+':'')+t.gd+'</td>'
      +'<td><strong style="color:var(--lime)">'+t.pts+'</strong></td></tr>';
  });
  h+='</tbody></table></div>';
  if(player_stats&&player_stats.length){
    function playerRow(p,col){
      var pl=(data.players||[]).find(function(x){return x.name===p.name;});
      var cap=pl&&window._capById?window._capById[pl.taken_by]:null;
      var teamName=cap?(cap.team_name||cap.name):'&mdash;';
      var pos=pl?pl.position:'';
      var pc=({GK:'pos-gk',DEF:'pos-def',MID:'pos-mid',ATK:'pos-atk'})[pos]||'pos-unknown';
      return '<tr>'
        +'<td><strong>'+p.name+'</strong></td>'
        +'<td><span class="pos-badge '+pc+'">'+(pos||'&mdash;')+'</span></td>'
        +'<td class="mono" style="font-size:.78rem">'+(pl&&pl.batch_year?pl.batch_year:'&mdash;')+'</td>'
        +'<td><span style="display:inline-flex;align-items:center;gap:5px">'+(cap?logoImg(cap.team_logo,18):'')+teamName+'</span></td>'
        +'<td class="mono" style="color:var(--lime);font-weight:700">'+(p[col]||0)+'</td>'
        +'</tr>';
    }
    function statSection(title,emoji,col){
      var rows=player_stats.filter(function(p){return (p[col]||0)>0;}).sort(function(a,b){return (b[col]||0)-(a[col]||0);});
      if(!rows.length) return '';
      return '<div class="section-title">'+emoji+' '+title+'</div>'
        +'<div style="overflow-x:auto"><table>'
        +'<thead><tr><th>Player</th><th>Pos</th><th>Year</th><th>Team</th><th>'+emoji+'</th></tr></thead>'
        +'<tbody>'+rows.slice(0,10).map(function(p){return playerRow(p,col);}).join('')+'</tbody>'
        +'</table></div>';
    }
    h+=statSection('Top Scorers','&#x26BD;','goals');
    h+=statSection('Top Assists','&#x1F3AF;','assists');
    h+=statSection('Top Cleansheets','&#x1F9E4;','cleansheets');
  }
  return h;
}

function fixturesHTML(){
  var gws=standings.gameweeks||[];
  if(!gws.length) return '';
  var h='<div class="section-title">Fixtures</div>';
  gws.forEach(function(gw){
    var gwDate='';
    if(gw.match_date){var p=gw.match_date.split('-');if(p.length===3){var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];gwDate=parseInt(p[2])+' '+months[parseInt(p[1])-1]+' '+p[0];}else{gwDate=gw.match_date;}}
    var gwLabel='GW'+gw.number+(gwDate?' · '+gwDate:'')+(gw.notes?' · '+gw.notes:'');
    h+='<div style="background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;overflow:hidden">';
    h+='<div style="padding:12px 16px;background:var(--pitch-light);font-family:Bebas Neue,sans-serif;font-size:1.1rem;letter-spacing:1.5px;color:var(--lime)">'+gwLabel+'</div>';
    // fixtures
    if(gw.fixtures&&gw.fixtures.length){
      gw.fixtures.forEach(function(f){
        var played=f.status==='played';
        var score=played?('<strong style="color:var(--lime)">'+f.home_score+' &ndash; '+f.away_score+'</strong>'):'<span style="color:var(--muted)">vs</span>';
        var pitch=f.pitch_name?(f.pitch_url?('<a href="'+f.pitch_url+'" target="_blank" style="font-size:.72rem;color:var(--muted);text-decoration:none">&#128205; '+f.pitch_name+'</a>'):'<span style="font-size:.72rem;color:var(--muted)">&#128205; '+f.pitch_name+'</span>'):'';
        var homeCap=window._capById&&Object.values(window._capById).find(function(c){return (c.team_name||c.name)===f.home_name;});
        var awayCap=window._capById&&Object.values(window._capById).find(function(c){return (c.team_name||c.name)===f.away_name;});
        var hLogo=homeCap?logoImg(homeCap.team_logo,22):'';
        var aLogo=awayCap?logoImg(awayCap.team_logo,22):'';
        h+='<div style="padding:10px 16px;border-bottom:1px solid rgba(45,92,62,.25)">';
        if(pitch) h+='<div style="margin-bottom:6px">'+pitch+'</div>';
        h+='<div style="display:flex;align-items:center;gap:8px">'
          +'<span style="display:inline-flex;align-items:center;gap:6px;font-weight:700;flex:1;justify-content:flex-end">'+f.home_name+hLogo+'</span>'
          +'<span style="font-family:Bebas Neue,sans-serif;font-size:1.3rem;min-width:54px;text-align:center">'+score+'</span>'
          +'<span style="display:inline-flex;align-items:center;gap:6px;font-weight:700;flex:1">'+aLogo+f.away_name+'</span>'
          +'</div></div>';
      });
    } else {
      h+='<div style="padding:10px 16px;font-size:.82rem;color:var(--muted)">No fixtures scheduled.</div>';
    }
    // shuttle toggle
    h+=shuttleSection(gw);
    h+='</div>';
  });
  return h;
}

function shuttleSection(gw){
  var id='shuttle-'+gw.id;
  var routes=gw.routes||[];
  var reqs=gw.shuttle||[];
  // group by route
  var byRoute={};
  reqs.forEach(function(r){ if(!byRoute[r.route_label]) byRoute[r.route_label]=[]; byRoute[r.route_label].push(r.player_name); });
  var total=reqs.length;
  var listHtml='';
  if(Object.keys(byRoute).length){
    listHtml=Object.entries(byRoute).map(function(e){
      return '<div style="margin-bottom:8px"><div style="font-size:.76rem;color:var(--lime);margin-bottom:3px">'+e[0]+' ('+e[1].length+')</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:4px">'+e[1].map(function(n){
          return '<span style="background:var(--pitch-mid);border:1px solid var(--border);border-radius:12px;padding:3px 10px;font-size:.78rem">'+n+'</span>';
        }).join('')+'</div></div>';
    }).join('');
  } else {
    listHtml='<div style="font-size:.8rem;color:var(--muted);margin-bottom:10px">No registrations yet.</div>';
  }
  var routeOpts=routes.map(function(r){return '<option value="'+r.id+'|'+r.label+'">'+r.label+'</option>';}).join('');
  var shuttleBtn='<details><summary style="border-top:1px solid var(--border);padding:10px 16px;cursor:pointer;list-style:none;display:flex;align-items:center;font-size:.82rem;font-weight:700;color:var(--muted);background:none">'
    +'<span>&#x1F68C; Shuttle</span>'+(total?'<span style="color:var(--lime);font-family:Bebas Neue,sans-serif;font-size:.9rem;margin-left:6px">'+total+' registered</span>':'')
    +'<span style="margin-left:auto;font-size:.7rem">&#9660;</span></summary>'
    +'<div style="padding:0 16px 14px">'
      +listHtml
      +'<div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">'
        +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
          +'<input id="'+id+'-name" placeholder="Your name" style="flex:1;min-width:140px;padding:7px 10px;font-size:.85rem"/>'
          +'<select id="'+id+'-route" style="flex:1;min-width:160px;padding:7px 10px;font-size:.85rem">'+routeOpts+'</select>'
        +'</div>'
        +'<button class="btn btn-primary btn-sm" style="align-self:flex-start" data-gwid="'+gw.id+'" data-sid="'+id+'" onclick="registerShuttle(this.dataset.gwid,this.dataset.sid)">🚌 Register / Toggle</button>'
      +'</div>'
    +'</div></details>';
  return shuttleBtn;
}



async function registerShuttle(gwid, id){
  var name=document.getElementById(id+'-name').value.trim();
  var routeVal=document.getElementById(id+'-route').value;
  if(!name){alert('Enter your name');return;}
  if(!routeVal){alert('Select a route');return;}
  var parts=routeVal.split('|');
  var routeId=parts[0], routeLabel=parts.slice(1).join('|');
  var res=await fetch('/api/events/'+eid+'/shuttle/'+gwid,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({player_name:name,route_id:routeId,route_label:routeLabel})
  });
  var data=await res.json();
  if(res.ok){
    var msg=data.action==='added'?'Registered for shuttle!':'Removed from shuttle.';
    alert(msg);
    loadResultsData();
  } else {alert('Error: '+(data.detail||'Unknown'));}
}


function zoomLogo(url){
  const o=document.createElement('div');
  o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:9999;cursor:pointer';
  o.innerHTML=`<img src="${url}" style="max-width:90vw;max-height:90vh;border-radius:10px;box-shadow:0 0 60px rgba(0,0,0,.8)"/>`;
  o.onclick=()=>document.body.removeChild(o);
  document.body.appendChild(o);
}
async function logout(){await fetch('/api/auth/logout',{method:'POST'});window.location.href='/';}
function toast(msg,e=false){const el=document.getElementById('toast');el.textContent=msg;el.className='show'+(e?' error':'');clearTimeout(toast._t);toast._t=setTimeout(()=>el.className='',2800);}
init();
</script>
</body>
</html>
